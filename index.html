<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manga Box — Gestionale per la tua collezione manga. Traccia volumi, spese, letture e statistiche.">
    <title>Manga Box</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#1F2335">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
</head>

<body>
    <div id="title-bar" class="desktop-only">
        <div class="title-bar-left">
            <!-- Sync Status with Cloud Emoji -->
            <span id="sync-status" class="sync-status">☁️ Never synced</span>
            <!-- Sync Button -->
            <button id="sync-btn" class="title-bar-btn" title="Sync with Google Drive">
                <svg class="sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2" />
                </svg>
            </button>
            <!-- Export Button -->
            <button id="export-btn" class="title-bar-btn" title="Quick Export">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5-5 5 5M12 15V3" />
                </svg>
            </button>
        </div>
    </div>
    <div id="app"></div>
    <div id="error-log"
        style="display:none; color: red; padding: 20px; background: #330000; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
    </div>

    <script>
        window.onerror = function (msg, url, line, col, error) {
            const el = document.getElementById('error-log');
            el.style.display = 'block';
            
            let message = msg;
            if (msg === 'Script error.') {
                message = '⚠️ <b>Script error</b> (masked).<br>This happens when external scripts (like Google Drive) fail to load or have issues, often due to AdBlockers or strict in-app browsers (like Telegram). <br>Please try opening the site in a standard browser like Chrome or Safari.';
            } else {
                message = '❌ ' + msg + ' at ' + (url || 'unknown') + ':' + (line || 0);
            }
            
            el.innerHTML += '<div style="margin-bottom: 10px; font-family: sans-serif; font-size: 14px; line-height: 1.4;">' + message + '</div>';
            
            // Auto-hide after 15 seconds if it's just a script error
            if (msg === 'Script error.') {
                setTimeout(() => {
                    el.style.display = 'none';
                }, 15000);
            }
        };
        window.onunhandledrejection = function (event) {
            const el = document.getElementById('error-log');
            el.style.display = 'block';
            el.innerHTML += '<div style="margin-bottom: 10px;">Uncaught Promise Error: ' + event.reason + '</div>';
        };
    </script>

    <!-- Import Maps for No-Build React -->
    <script type="importmap">
    {
        "imports": {
            "preact": "https://esm.sh/preact@10.19.3",
            "preact/hooks": "https://esm.sh/preact@10.19.3/hooks",
            "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact",
            "idb": "https://esm.sh/idb@8.0.0",
            "chart.js/auto": "https://esm.sh/chart.js@4.4.1/auto",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.2.0"
        }
    }
    </script>



    <script type="module" src="./src/main.js"></script>

    <script>
        // Registrazione del Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((registration) => {
                    console.log('SW registrato con successo:', registration.scope);

                    // Controlla aggiornamenti
                    registration.onupdatefound = () => {
                        const installingWorker = registration.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // Nuova versione disponibile! Forza aggiornamento
                                showUpdateNotification();
                                setTimeout(() => {
                                    installingWorker.postMessage('skipWaiting');
                                }, 1500); // 1.5s delay to show the message
                            }
                        };
                    };
                }).catch((error) => {
                    console.log('Registrazione SW fallita:', error);
                });
            });

            // Refresh quando il nuovo SW prende il controllo
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }

        function showUpdateNotification() {
            const el = document.getElementById('error-log');
            el.style.display = 'block';
            el.style.background = '#004400'; // Green for update
            el.style.color = '#ffffff';
            el.innerHTML = '<div style="display: flex; justify-content: center; align-items: center;">' +
                '<span>🚀 Aggiornamento alla versione più recente...</span>' +
                '</div>';
        }
    </script>
</body>

</html>
